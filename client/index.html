<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chi tiêu thông minh</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          animation: {
            'spin-slow': 'spin 3s linear infinite',
            'fade-in': 'fadeIn 0.5s ease-out forwards',
            'fade-in-up': 'fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards',
            'progress-loading': 'progress 1.5s ease-in-out infinite',
            'scale-up': 'scaleUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards',
            'text-shimmer': 'textShimmer 6s linear infinite',
            'blur-fade-in': 'blurFadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards',
            'float': 'float 5s ease-in-out infinite',
            'slide-in-down': 'slideInDown 0.8s ease-out forwards',
          },
          keyframes: {
            fadeIn: {
              '0%': { opacity: '0' },
              '100%': { opacity: '1' },
            },
            fadeInUp: {
              '0%': { opacity: '0', transform: 'translateY(20px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
            scaleUp: {
              '0%': { opacity: '0', transform: 'scale(0.9)' },
              '100%': { opacity: '1', transform: 'scale(1)' },
            },
            blurFadeIn: {
              '0%': { opacity: '0', filter: 'blur(10px)', transform: 'translateY(10px)' },
              '100%': { opacity: '1', filter: 'blur(0)', transform: 'translateY(0)' },
            },
            textShimmer: {
              '0%': { backgroundPosition: '200% 0' },
              '100%': { backgroundPosition: '-200% 0' },
            },
            float: {
              '0%, 100%': { transform: 'translateY(0px) rotate(0deg)' },
              '50%': { transform: 'translateY(-20px) rotate(2deg)' },
            },
            slideInDown: {
              'from': { transform: 'translateY(-50px)', opacity: '0' },
              'to': { transform: 'translateY(0)', opacity: '1' },
            },
            fadeSlideUp: {
              'from': { opacity: '0', transform: 'translateY(20px)' },
              'to': { opacity: '1', transform: 'translateY(0)' },
            },
            shimmer: {
              '0%': { backgroundPosition: '-200% center' },
              '100%': { backgroundPosition: '200% center' },
            },
            'orbit-slow': {
              '0%': { transform: 'translate(0, 0) rotate(0deg)' },
              '33%': { transform: 'translate(5px, -10px) rotate(1deg)' },
              '66%': { transform: 'translate(-5px, 5px) rotate(-1deg)' },
              '100%': { transform: 'translate(0, 0) rotate(0deg)' },
            },
            'orbit-fast': {
              '0%': { transform: 'translate(0, 0)' },
              '50%': { transform: 'translate(-8px, 12px)' },
              '100%': { transform: 'translate(0, 0)' },
            },
            progress: {
              '0%': { transform: 'translateX(-100%)' },
              '100%': { transform: 'translateX(100%)' },
            }
          },
          colors: {
            primary: {
              50: '#f0fdf4',
              100: '#dcfce7',
              400: '#4ade80',
              500: '#22c55e',
              600: '#16a34a',
              700: '#15803d',
              800: '#166534',
            },
            slate: {
              50: '#f8fafc',
              100: '#f1f5f9',
              200: '#e2e8f0',
              300: '#cbd5e1',
              400: '#94a3b8',
              500: '#64748b',
              600: '#475569',
              700: '#334155',
              800: '#1e293b',
              900: '#0f172a',
              950: '#020617',
            }
          },
          fontFamily: {
            sans: ['Manrope', 'sans-serif'],
          },
        },
      },
    }
  </script>
  <style>
    /* Custom scrollbar for cleaner look */
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #f1f1f1;
    }

    .dark ::-webkit-scrollbar-track {
      background: #1e293b;
    }

    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 4px;
    }

    .dark ::-webkit-scrollbar-thumb {
      background: #475569;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }

    .glass-nav {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .card-gradient {
      background: linear-gradient(180deg, rgba(15, 23, 42, 0.6) 0%, rgba(2, 6, 23, 0.8) 100%);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .text-gradient-shimmer {
      background: linear-gradient(90deg, #22c55e 0%, #4ade80 25%, #ffffff 50%, #4ade80 75%, #22c55e 100%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shimmer 4s linear infinite;
    }

    .hero-text-glow {
      filter: drop-shadow(0 0 20px rgba(34, 197, 94, 0.4));
    }

    .animate-premium-heading {
      animation: fadeSlideUp 1s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    .floating-badge {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      padding: 6px 14px;
      border-radius: 14px;
      font-size: 0.75rem;
      font-weight: 700;
      position: absolute;
      z-index: 50;
      pointer-events: none;
      white-space: nowrap;
    }

    .animate-orbit-slow {
      animation: orbit-slow 5s ease-in-out infinite;
    }

    .animate-orbit-fast {
      animation: orbit-fast 4s ease-in-out infinite;
    }

    .animated-underline-gradient {
      background: linear-gradient(90deg, rgba(34, 197, 94, 0) 0%, rgba(34, 197, 94, 1) 50%, rgba(34, 197, 94, 0) 100%);
      background-size: 200% 100%;
      animation: shimmer 3s infinite linear;
    }
  </style>
  <script type="importmap">
{
  "imports": {
    "react-router-dom": "https://aistudiocdn.com/react-router-dom@^7.9.6",
    "recharts": "https://aistudiocdn.com/recharts@^3.4.1",
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/"
  }
}
</script>
</head>

<body
  class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-50 font-sans antialiased transition-colors duration-300">
  <div id="root"></div>
  <script type="module" src="./index.tsx"></script>
</body>

</html>
